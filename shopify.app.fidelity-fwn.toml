# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9c4a2acf31324296ca42ee5310a4900a"
name = "fidelity-fwn"
application_url = "https://fwn-tech.com/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "customers/create" ]
  uri = "/webhooks/app/customers_create"

  [[webhooks.subscriptions]]
  topics = [ "customers/update" ]
  uri = "/webhooks/app/customers_update"

  [[webhooks.subscriptions]]
  topics = [ "customers/delete" ]
  uri = "/webhooks/app/customers_delete"

  [[webhooks.subscriptions]]
  topics = [ "customers_email_marketing_consent/update" ]
  uri = "/webhooks/app/customers_email_marketing_consent_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/app/orders_paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "/webhooks/app/orders_cancelled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Full scopes for loyalty program app
scopes = "write_customers,read_customers,write_discounts,read_discounts,read_orders,write_price_rules,write_app_proxy,read_products,write_products,unauthenticated_write_customers,unauthenticated_read_customers"

[auth]
redirect_urls = [
  "https://fwn-tech.com/auth/callback",
  "https://fwn-tech.com/auth/shopify/callback",
  "https://fwn-tech.com/api/auth/callback"
]

[app_proxy]
url = "/proxy"
prefix = "apps"
subpath = "loyalty"

